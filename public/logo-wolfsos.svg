<svg viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003D70;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Wolf head silhouette (simplified) -->
  <g id="wolf-head">
    <!-- Left ear -->
    <polygon points="45,35 35,15 50,25" fill="#003D70"/>
    <!-- Right ear -->
    <polygon points="65,35 75,15 60,25" fill="#003D70"/>
    <!-- Head -->
    <circle cx="55" cy="50" r="20" fill="url(#blueGradient)"/>
    <!-- Snout -->
    <ellipse cx="55" cy="58" rx="12" ry="8" fill="#4A90E2"/>
    <!-- Eye left -->
    <circle cx="50" cy="45" r="2.5" fill="white"/>
    <!-- Eye right -->
    <circle cx="60" cy="45" r="2.5" fill="white"/>
  </g>

  <!-- Medical cross -->
  <g id="medical-cross" transform="translate(90, 40)">
    <!-- Vertical bar -->
    <rect x="-3" y="-15" width="6" height="30" fill="#E74C3C" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="-15" y="-3" width="30" height="6" fill="#E74C3C" rx="2"/>
    <!-- Circle border -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#E74C3C" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Heartbeat line -->
  <g id="heartbeat" transform="translate(20, 110)">
    <path d="M 0 15 L 15 15 L 20 10 L 25 20 L 35 5 L 45 15 L 60 15"
          stroke="#E74C3C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text: WolfSOS -->
  <text x="20" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#003D70" letter-spacing="-1">
    Wolf
  </text>
  <text x="160" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#4A90E2">
    SOS
  </text>

  <!-- Subtitle -->
  <text x="20" y="185" font-family="Arial, sans-serif" font-size="11" fill="#666" letter-spacing="1">
    EMERGENCIA VETERINARIA
  </text>
</svg>
