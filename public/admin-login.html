<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf SOS — Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #1b4332; margin-bottom: 10px; font-size: 1.5rem; }
    .subtitle { color: #666; margin-bottom: 40px; font-size: 0.9rem; }
    .btn {
      background: #1b4332;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      margin-bottom: 15px;
    }
    .btn:hover { background: #0f2818; }
    .btn-google {
      background: white;
      color: #1b4332;
      border: 2px solid #1b4332;
    }
    .btn-google:hover { background: #f5f5f0; }
    .error { color: #c0392b; background: #fdf0ee; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; }
    .loading { text-align: center; color: #666; }
  </style>
</head>
<body>
<div class="card">
  <h1>🐾 Wolf SOS</h1>
  <p class="subtitle">Panel de Administración</p>

  <div id="loginForm">
    <p style="color: #666; margin-bottom: 20px; font-size: 0.9rem;">
      Solo administradores pueden acceder
    </p>
    <button class="btn btn-google" id="googleLoginBtn">
      🔐 Ingresar con Google
    </button>
    <div id="loginError" class="error" style="display: none;"></div>
  </div>

  <div id="loadingScreen" style="display: none; padding: 40px 0;">
    <div class="loading">
      <p>Redirigiendo a Google...</p>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  const API = location.origin;

  // Verificar si ya hay token guardado
  const savedToken = localStorage.getItem('adminToken');
  if (savedToken) {
    location.href = '/admin-panel.html';
  }

  // Google Sign-In con OAuth real
  async function initGoogleAuth() {
    try {
      const response = await fetch(`${API}/auth/google/url`);
      const data = await response.json();
      document.getElementById('googleLoginBtn').href = data.authUrl;
    } catch (err) {
      console.error('Error initializing Google Auth:', err);
    }
  }

  // Si viene del callback de Google
  const params = new URLSearchParams(location.search);
  const code = params.get('code');

  if (code) {
    // Google devolvió un código, intercambiarlo por token
    (async () => {
      document.getElementById('loadingScreen').style.display = 'block';
      document.getElementById('loginForm').style.display = 'none';
      try {
        const res = await fetch(`${API}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        if (data.token) {
          localStorage.setItem('adminToken', data.token);
          location.href = '/admin-panel.html';
        } else {
          throw new Error(data.error || 'Login failed');
        }
      } catch (err) {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('loginError').textContent = err.message;
        document.getElementById('loginError').style.display = 'block';
      }
    })();
  } else {
    // Inicializar botón de Google
    initGoogleAuth();
    document.getElementById('googleLoginBtn').addEventListener('click', (e) => {
      // El href ya está configurado, dejar que el navegador siga el enlace
    });
  }
</script>
</body>
</html>
