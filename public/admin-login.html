<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf SOS — Admin Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
    }
    h1 { color: #1b4332; margin-bottom: 10px; font-size: 1.5rem; }
    .subtitle { color: #666; margin-bottom: 40px; font-size: 0.9rem; }
    .btn {
      background: #1b4332;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
      margin-bottom: 15px;
    }
    .btn:hover { background: #0f2818; }
    .btn-google {
      background: white;
      color: #1b4332;
      border: 2px solid #1b4332;
    }
    .btn-google:hover { background: #f5f5f0; }
    .error { color: #c0392b; background: #fdf0ee; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 0.85rem; }
    .loading { text-align: center; color: #666; }
  </style>
</head>
<body>
<div class="card">
  <h1>🐾 Wolf SOS</h1>
  <p class="subtitle">Panel de Administración</p>

  <div id="loginForm">
    <p style="color: #666; margin-bottom: 20px; font-size: 0.9rem;">
      Solo administradores pueden acceder
    </p>
    <button class="btn btn-google" id="googleLoginBtn">
      🔐 Ingresar con Google
    </button>

    <div style="border-top: 1px solid #ddd; margin: 20px 0; padding: 20px 0;">
      <p style="color: #666; font-size: 0.85rem; margin-bottom: 15px;">
        O usa tu contraseña de administrador
      </p>
      <div style="display: flex; gap: 10px;">
        <input type="password" id="adminPassword" placeholder="Contraseña admin" style="flex: 1; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px;">
        <button id="passwordLoginBtn" style="background: #2d6a4f; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600;">Entrar</button>
      </div>
    </div>

    <div id="loginError" class="error" style="display: none;"></div>
  </div>

  <div id="loadingScreen" style="display: none; padding: 40px 0;">
    <div class="loading">
      <p>⏳ Autenticando...</p>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDQnbfxK0iLZENKGx3p7mPIH8BYXqI6Cdc",
    authDomain: "wolfsos.firebaseapp.com",
    projectId: "wolfsos",
    storageBucket: "wolfsos.appspot.com",
    messagingSenderId: "665011660856",
    appId: "1:665011660856:web:f0e6f4e1234567890abcdef"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const API = location.origin;

  // Verificar si ya hay token guardado
  const savedToken = localStorage.getItem('adminToken');
  if (savedToken) {
    location.href = '/admin.html';
  }

  // Google Sign-In
  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    try {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('loadingScreen').style.display = 'block';

      const result = await signInWithPopup(auth, provider);
      const idToken = await result.user.getIdToken();

      // Enviar idToken al backend
      const res = await fetch(`${API}/api/admin/login-firebase`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem('adminToken', data.token);
        location.href = '/admin-panel.html';
      } else {
        throw new Error(data.error || 'Login failed');
      }
    } catch (err) {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('loginError').textContent = `Error: ${err.message}`;
      document.getElementById('loginError').style.display = 'block';
    }
  });

  // Login por contraseña
  document.getElementById('passwordLoginBtn').addEventListener('click', async () => {
    const password = document.getElementById('adminPassword').value;
    const errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    if (!password) {
      errEl.textContent = 'Ingresa la contraseña';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${API}/api/admin/login-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();

      if (data.token) {
        localStorage.setItem('adminToken', data.token);
        location.href = '/admin-panel.html';
      } else if (data.error) {
        throw new Error(data.error);
      }
    } catch (err) {
      errEl.textContent = `Error: ${err.message}`;
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
