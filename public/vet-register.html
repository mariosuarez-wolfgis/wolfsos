<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolf SOS — Registro de Veterinario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #2d6a4f 0%, #1b4332 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
      padding: 40px;
    }
    h1 { color: #1b4332; margin-bottom: 30px; font-size: 1.5rem; }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    label { font-size: 0.85rem; font-weight: 600; color: #333; }
    input {
      padding: 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #2d6a4f;
      box-shadow: 0 0 0 3px rgba(45, 106, 79, 0.1);
    }
    .btn {
      background: #2d6a4f;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
      margin-top: 20px;
    }
    .btn:hover { background: #1b4332; }
    .error { color: #c0392b; font-size: 0.85rem; background: #fdf0ee; padding: 10px; border-radius: 6px; margin-top: 10px; }
    .success { color: #1b4332; font-size: 0.85rem; background: #f0faf4; padding: 10px; border-radius: 6px; margin-top: 10px; }
    .info { color: #666; font-size: 0.9rem; background: #f5f5f0; padding: 12px; border-radius: 6px; margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="card">
  <h1>🐾 Completar Registro</h1>

  <div id="step1">
    <div class="info">
      ✓ Tu perfil ya fue llenado por el administrador. Solo falta tu contraseña.
    </div>

    <form id="registerForm" novalidate>
      <div class="form-group">
        <label>Contraseña *</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn">Completar Registro</button>
      <div id="registerError" class="error" style="display: none;"></div>
    </form>
  </div>

  <div id="step2" style="display: none;">
    <div class="success">
      ✅ ¡Bienvenido! Tu cuenta está lista.
    </div>
    <p style="color: #666; margin-top: 20px; margin-bottom: 20px;">
      Ahora puedes acceder a tu panel de veterinario
    </p>
    <a href="/admin.html" style="display: block; text-align: center; background: #2d6a4f; color: white; padding: 14px; border-radius: 8px; text-decoration: none; font-weight: 700;">
      Ir a mi panel
    </a>
  </div>
</div>

<script>
  const API = location.origin;

  // Obtener token de invitación de URL
  const params = new URLSearchParams(location.search);
  const invitationToken = params.get('token');

  if (!invitationToken) {
    document.getElementById('registerError').textContent = 'Token de invitación inválido o expirado';
    document.getElementById('registerError').style.display = 'block';
  }

  // Manejar submit del formulario
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const errEl = document.getElementById('registerError');
    errEl.style.display = 'none';

    if (!password) {
      errEl.textContent = 'Por favor ingresa una contraseña';
      errEl.style.display = 'block';
      return;
    }

    if (password.length < 6) {
      errEl.textContent = 'La contraseña debe tener mínimo 6 caracteres';
      errEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch(`${API}/api/vets/register-simple`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          password,
          invitationToken,
        })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem('vetToken', data.token);
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      } else {
        throw new Error(data.error || 'Registro fallido');
      }
    } catch (err) {
      errEl.textContent = `Error: ${err.message}`;
      errEl.style.display = 'block';
    }
  });
</script>
</body>
</html>
